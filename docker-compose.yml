version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: finsight-postgres
    environment:
      POSTGRES_DB: finsight
      POSTGRES_USER: finsight
      POSTGRES_PASSWORD: finsight
    ports:
      - "5432:5432"
    volumes:
      - finsight_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: finsight-redis
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: finsight-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - finsight_qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: finsight-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - finsight_minio_data:/data

volumes:
  finsight_postgres_data:
  finsight_qdrant_data:
  finsight_minio_data: